name: bench-cron

on:
  schedule:
    # Quarterly: 03:00 UTC on the 1st of Jan, Apr, Jul, Oct.
    - cron: "0 3 1 1,4,7,10 *"
  workflow_dispatch:
    inputs:
      benchmark:
        description: "Benchmark to run"
        type: choice
        required: true
        default: longmemeval
        options:
          - longmemeval
          - locomo
          - realagentmem
      systems:
        description: "Comma-separated systems (or 'all')"
        type: string
        required: false
        default: all

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GETMNEMO_API_KEY: ${{ secrets.GETMNEMO_API_KEY }}
      GETMNEMO_WORKSPACE_ID: ${{ secrets.GETMNEMO_WORKSPACE_ID }}
      MEM0_API_KEY: ${{ secrets.MEM0_API_KEY }}
      ZEP_API_KEY: ${{ secrets.ZEP_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run benchmark
        run: |
          BENCH="${{ github.event.inputs.benchmark || 'longmemeval' }}"
          SYS="${{ github.event.inputs.systems || 'all' }}"
          getmnemo-eval run --benchmark "$BENCH" --systems "$SYS" --output ./results

      - name: Publish to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          if [[ -z "$R2_ENDPOINT" || -z "$R2_BUCKET" ]]; then
            echo "R2 not configured — uploading as workflow artifact instead"
            exit 0
          fi
          pip install awscli
          aws --endpoint-url "$R2_ENDPOINT" s3 cp ./results "s3://$R2_BUCKET/" --recursive

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: results/
